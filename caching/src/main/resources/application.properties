server.port=${SERVER_PORT:8082}
spring.application.name=edgefabric-cache-node
# Force MVC mode ? spring-boot-starter-webflux is on classpath for WebClient only
spring.main.web-application-type=servlet
# Enable virtual threads to prevent thread pool starvation from blocking I/O
spring.threads.virtual.enabled=true
# Graceful shutdown ensures @PreDestroy hooks (CloudMap deregister, gossip stop) fire on SIGTERM
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs

# Maximum memory for cache entries in bytes (Default: 600MB = 629145600)
# Override via CACHE_MAX_MEMORY env var. E.g. for a 1GB EC2: set to 850MB (891289600)
# leaving 150MB for JVM heap/GC/OS overhead.
edgefabric.cache.max-memory-bytes=${CACHE_MAX_MEMORY:629145600}

# Registry integration (set to false for gossip-only mode)
edgefabric.registry.enabled=${REGISTRY_ENABLED:false}
registry.service-registry-url=${REGISTRY_URL:http://localhost:9000}
registry.heartbeat-interval-ms=15000

registry.retry.attempts=5
registry.retry.delay=3

# AWS Cloud Map - auto-register / deregister on startup / shutdown
# Disabled by default (Docker Compose / local dev). Set CLOUDMAP_ENABLED=true on EC2.
cloudmap.enabled=${CLOUDMAP_ENABLED:false}
cloudmap.service-id=${CLOUDMAP_SERVICE_ID:}
cloudmap.region=${AWS_REGION:ap-south-1}

# Node registration settings
node.ip=${NODE_IP:localhost}

# Gossip protocol settings
gossip.port=${GOSSIP_PORT:7946}
# Fanout increased from 3 to 5 for faster failure propagation
# Interval reduced from 5000ms to 1000ms for 2-second convergence time in 10-node cluster
# (was 15 seconds with fanout=3, interval=5000ms)
gossip.fanout=5
gossip.message-interval-ms=1000

# Cluster peer discovery DNS (must match docker-compose network alias)
cluster.dns-name=${CLUSTER_DNS:cache-nodes.cache-cluster.internal}

# Actuator / Prometheus metrics endpoint
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true

# Failure detector settings (separate UDP port from gossip)
failure-detector.gossip-port=${FD_PORT:7000}
failure-detector.probe-interval-ms=1000
failure-detector.ping-timeout-ms=500
failure-detector.indirect-probe-fanout=3
# Suspect timeout reduced from 10000ms to 3000ms for faster dead node detection
# Combined with faster gossip (interval=1000ms), dead nodes are removed within 5 seconds
# (was 10s suspect + 15s gossip = 25 seconds total)
failure-detector.suspect-timeout-ms=3000

# Hash ring config ? MUST match loadbalancer ring.* values for consistent routing
ring.virtual-nodes=150
ring.hash-algorithm=xxhash

# Anti-entropy background scrubbing (Strategy 2: Random Sampling + Version Compare)
# Enabled by default; set to false to disable the scrubber entirely
cache.anti-entropy.enabled=${ANTI_ENTROPY_ENABLED:true}
# How often to run a scrub round (milliseconds); default = 30 minutes (reduced from 5 min)
cache.anti-entropy.interval-ms=${ANTI_ENTROPY_INTERVAL_MS:1800000}
# Number of random keys to sample per round; default = 20 (reduced from 100)
cache.anti-entropy.sample-size=${ANTI_ENTROPY_SAMPLE_SIZE:20}
# Throttle delay between key scans (milliseconds); default = 10 ms
cache.anti-entropy.rate-limit-ms=${ANTI_ENTROPY_RATE_LIMIT_MS:10}

# Self-healing scheduler for WAL-driven stale entry tracking
cache.self-healing.enabled=${SELF_HEALING_ENABLED:true}
cache.self-healing.interval-ms=${SELF_HEALING_INTERVAL_MS:30000}
cache.self-healing.batch-size=${SELF_HEALING_BATCH_SIZE:100}
cache.self-healing.retry-max=${SELF_HEALING_RETRY_MAX:3}
cache.self-healing.timeout-ms=${SELF_HEALING_TIMEOUT_MS:5000}

# Key migration on topology change
migration.enabled=${MIGRATION_ENABLED:true}
migration.rate-limit=500
migration.debounce-ms=2000
migration.max-retries=3
migration.backoff-base-ms=1000
migration.backoff-max-ms=30000
# Must match quorum.replication-factor on the load balancer
migration.replication-factor=${REPLICATION_FACTOR:3}
# Delay before deleting local copy after push ? gives LB ring-sync time to catch up (3x sync-interval-ms)
migration.delete-delay-ms=${MIGRATION_DELETE_DELAY_MS:15000}

management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Node drain for maintenance
# Grace period (milliseconds) to allow in-flight requests to complete after drain starts.
# Matches LB sync interval (typically 5s) for consistency.
drain.grace-period-ms=${DRAIN_GRACE_PERIOD_MS:10000}

# WAL-driven cache-side self-healing (reads LB WAL from S3, repairs missed writes)
# Disabled by default — enable on EC2 with WAL_HEALING_ENABLED=true
cache.wal.enabled=${WAL_HEALING_ENABLED:false}
cache.wal.s3-bucket=ef-hermes-wal
cache.wal.lb-id=lb1
cache.wal.region=${AWS_REGION:ap-south-1}
cache.wal.interval-ms=60000
cache.wal.max-entries-per-cycle=500
cache.wal.peer-timeout-ms=5000
cache.wal.client.lb-base-url=${LB_BASE_URL:http://loadbalancer:8080}
cache.wal.client.queue-capacity=1000
cache.wal.client.timeout-ms=500

# gRPC server for internal cache GET requests forwarded by the load balancer.
# Disabled at runtime via edgefabric.grpc.enabled=false (HTTP path stays available).
edgefabric.grpc.enabled=${GRPC_ENABLED:true}
edgefabric.grpc.port=${GRPC_PORT:9091}



# Tempo receives spans on Zipkin protocol
management.zipkin.tracing.endpoint=${TEMPO_ENDPOINT:http://10.0.14.141:9411/api/v2/spans}

# trace all requests in dev
management.tracing.sampling.probability=1.0

# add traceId and spanId in logs
logging.pattern.level=%5p [${spring.application.name},%X{traceId},%X{spanId}]