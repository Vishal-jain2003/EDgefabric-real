global:
  resolve_timeout: 5m
  # Gmail SMTP config (use App Password, not account password)
  smtp_smarthost: 'smtp.gmail.com:465'
  smtp_from: 'mohankuldeep1234@gmail.com'
  smtp_auth_username: 'mohankuldeep1234@gmail.com'
  smtp_auth_password: 'hpjq ortf ixvi lauf'  # Generate at https://myaccount.google.com/apppasswords
  smtp_require_tls: false

route:
  receiver: 'email-all'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'email-all'
    email_configs:
      - to: 'kuldeep_kumar@epam.com'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] EdgeFabric: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['component', 'instance']
