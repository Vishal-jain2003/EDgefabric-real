apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    url: http://localhost:3100
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceName: Loki
          matcherRegex: "traceId=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
