server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://${LOKI_URL:-localhost}:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      # Fallback: if service label is empty (no Docker Compose label), use container name
      - source_labels: ['service', '__meta_docker_container_name']
        separator: '~'
        regex: '~/?(.+)'
        target_label: service
        replacement: '$1'
    pipeline_stages:
      - json:
          expressions:
            level: level
            operation: operation
            result: result
            message: message
            node_id: nodeId

      - labels:
          level:
          operation:
          result:
          node_id:
