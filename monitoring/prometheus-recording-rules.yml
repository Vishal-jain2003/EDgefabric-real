groups:
  - name: edgefabric_slo_recording
    interval: 15s
    rules:
      # Availability SLI: ratio of up instances over 1 minute
      - record: job:edgefabric_availability:ratio_1m
        expr: |
          sum(rate(up{job=~"edgefabric-.*"}[1m]))
          /
          count(up{job=~"edgefabric-.*"})

      # Error rate SLI: cache miss ratio over 5 minutes
      - record: job:edgefabric_error_rate:ratio_5m
        expr: |
          sum(rate(edgefabric_cache_misses_total[5m]))
          /
          (sum(rate(edgefabric_cache_hits_total[5m])) + sum(rate(edgefabric_cache_misses_total[5m])))

      # Quorum success SLI: successful quorum writes over 1 minute
      - record: job:edgefabric_quorum_success:ratio_1m
        expr: |
          sum(rate(edgefabric_quorum_writes_total{result="success"}[1m]))
          /
          sum(rate(edgefabric_quorum_writes_total[1m]))

      # Latency SLI: p99 request latency over 30 minutes
      - record: job:edgefabric_request_latency:p99_30m
        expr: |
          histogram_quantile(
            0.99,
            rate(http_server_requests_seconds_bucket{job="edgefabric-loadbalancer"}[30m])
          )

      # Burn rate: 1-hour availability burn rate (how fast we consume error budget)
      - record: job:edgefabric_burn_rate:1h
        expr: |
          (1 - job:edgefabric_availability:ratio_1m) / 0.001

      # Cluster health: fraction of nodes in gossip cluster that are ALIVE
      - record: job:edgefabric_cluster_health:ratio
        expr: |
          sum(edgefabric_gossip_node_status{status="ALIVE"})
          /
          sum(edgefabric_gossip_node_status)
